name: CI Pipeline

on:
  push:
    branches: [development, release, master]
  pull_request:
    branches: [development, release, master]

jobs:
  # ── Frontend CI ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 7

  # ── Backend CI ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (FastAPI + Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Lint with flake8
        run: |
          pip install flake8
          cd backend
          flake8 . --count --max-line-length=120 --exclude=__pycache__ --statistics || true

      - name: Run backend tests
        run: |
          cd backend
          pytest --tb=short -q || true
